<aside
  class="grid gap-[7px] rounded-lg border border-mooping-orange/25 bg-[linear-gradient(180deg,rgba(255,107,0,0.13),rgba(255,255,255,0.04))] bg-mooping-surface p-4"
  aria-label="Current shop status"
>
  <span class="text-[0.82rem] font-extrabold text-[#b9b3ad]">สถานะหน้าร้าน</span>
  <strong class="text-2xl font-black leading-[1.05] text-mooping-orange-light">
    {{ statusLabel() }}
  </strong>
  <small class="text-[0.82rem] font-extrabold text-[#b9b3ad]">
    {{ saleMode() === 'quick' ? 'ขายเร็ว' : 'สมาชิก LINE' }} · {{ progressMessage() }}
  </small>
</aside>
