<main
  class="min-h-dvh bg-[linear-gradient(180deg,#050505_0%,#101010_48%,#050505_100%)] px-3.5 pt-3.5 pb-11 font-body text-slate-50 sm:px-[clamp(16px,4vw,44px)] sm:pt-[18px] sm:pb-12"
>
  <app-top-nav />

  <section id="home" class="mx-auto max-w-[1380px] pt-2.5" aria-labelledby="workspace-title">
    <header
      class="mb-[18px] grid items-end gap-[18px] lg:grid-cols-[minmax(0,1fr)_minmax(280px,360px)]"
    >
      <div>
        <p class="mb-2.5 text-xs font-black uppercase tracking-normal text-mooping-orange">
          Front Shop POS
        </p>
        <h1
          id="workspace-title"
          class="max-w-[820px] text-[1.82rem] font-black leading-[1.02] tracking-normal text-slate-50 sm:text-[2.15rem] lg:text-[2.65rem]"
        >
          MooPing Reward
        </h1>
        <p class="mt-3 max-w-[680px] text-base leading-7 text-[#b9b3ad]">
          หน้าร้านสำหรับขายเร็วเป็นหลัก ลูกค้าที่รีบซื้อแล้วไปได้ทันที
          ส่วนลูกค้าที่อยากสะสมข้ามรอบค่อยใช้โหมดสมาชิก LINE
        </p>
      </div>

      <app-shift-status-panel
        [saleMode]="store.saleMode()"
        [statusLabel]="store.shopStatusLabel()"
        [progressMessage]="store.progressMessage()"
      />
    </header>

    <div
      id="pos"
      class="grid items-start gap-[18px] xl:grid-cols-[minmax(360px,1.08fr)_minmax(340px,0.92fr)_minmax(280px,0.72fr)]"
      aria-label="MooPing Reward workspace"
    >
      <app-pos-panel
        [saleMode]="store.saleMode()"
        [customers]="store.filteredCustomers()"
        [selectedCustomer]="store.selectedCustomer()"
        [selectedCustomerId]="store.selectedCustomerId()"
        [customerSearch]="store.customerSearch()"
        [quickAmounts]="store.quickAmounts"
        [pendingSticks]="store.pendingSticks()"
        [checkoutPreview]="store.checkoutPreview()"
        [checkoutState]="store.checkoutState()"
        [lastSale]="store.lastSale()"
        (saleModeChanged)="selectSaleMode($event)"
        (customerSelected)="selectCustomer($event)"
        (customerSearched)="updateCustomerSearch($event)"
        (pendingSticksAdded)="addPendingSticks($event)"
        (pendingStickRemoved)="removePendingStick()"
        (pendingSaleCleared)="clearPendingSale()"
        (pendingSaleConfirmed)="confirmPendingSale()"
        (lastSaleUndone)="undoLastSale()"
      />

      <div class="grid gap-[18px]">
        <app-display-panel
          [customer]="store.displayCustomer()"
          [progressMessage]="store.progressMessage()"
          [stamps]="store.stamps()"
          [saleMode]="store.saleMode()"
          [pendingSticks]="store.pendingSticks()"
          [checkoutPreview]="store.checkoutPreview()"
          [quickRewardCredits]="store.quickRewardCredits()"
        />

        <app-reward-panel
          [customer]="store.rewardCustomer()"
          [rewards]="store.rewards"
          (rewardSelected)="claimReward($event)"
        />
      </div>

      <section id="line-oa" class="grid gap-[18px]" aria-labelledby="line-title">
        <header class="flex flex-col gap-2">
          <p class="text-xs font-black uppercase tracking-normal text-mooping-line">
            LINE OA Optional
          </p>
          <h2
            id="line-title"
            class="text-[1.45rem] font-bold leading-[1.12] tracking-normal text-slate-50"
          >
            แจ้งเตือนเฉพาะลูกค้าที่เลือกสะสม
          </h2>
        </header>

        <app-line-panel [messages]="store.lineMessages()" />
      </section>
    </div>
  </section>
</main>
